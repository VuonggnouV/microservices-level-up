server:
  port: 8761 # Default Port huyền thoại của Eureka Server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false # Vì đây là server nên không cần tự đăng ký với chính nó
    fetch-registry: false       # Không cần tải danh sách đăng ký về làm gì
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/